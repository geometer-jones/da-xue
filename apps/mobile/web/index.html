<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="daxue_mobile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>daxue_mobile</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    #loading-screen {
      align-items: center;
      background: #e8f0e2;
      color: #ffffff;
      display: flex;
      inset: 0;
      justify-content: center;
      position: fixed;
      z-index: 9999;
      transition: opacity 240ms ease-out;
    }

    #loading-screen.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-card {
      align-items: center;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
    }

    .loading-logo {
      border-radius: 16px;
      box-shadow: 0 8px 24px rgb(0 0 0 / 20%);
      height: 128px;
      object-fit: cover;
      width: 128px;
    }

    .loading-spinner {
      border: 4px solid rgb(255 255 255 / 35%);
      border-bottom-color: #ffffff;
      border-radius: 50%;
      box-sizing: border-box;
      height: 36px;
      width: 36px;
      animation: loading-rotation 750ms linear infinite;
    }

    @keyframes loading-rotation {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-label {
      color: #ffffff;
      font: 600 16px/1 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="loading-screen" role="status" aria-live="polite">
    <div class="loading-card">
      <img class="loading-logo" src="favicon.png" alt="Da Xue favicon">
      <div class="loading-spinner" aria-hidden="true"></div>
      <div class="loading-label">Loading Da Xue</div>
    </div>
  </div>
  <script>
    (() => {
      const loadingScreen = document.getElementById('loading-screen');
      const hideLoadingScreen = () => {
        if (!loadingScreen || !document.body.contains(loadingScreen)) {
          return;
        }

        loadingScreen.classList.add('is-hidden');
        window.setTimeout(() => loadingScreen.remove(), 260);
      };

      window.addEventListener('flutter-first-frame', hideLoadingScreen);
      window.setTimeout(hideLoadingScreen, 10000);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
